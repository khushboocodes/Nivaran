services:
  - type: web
    name: nivaran-api
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_COOKIE_NAME
        value: nivaran_session
      - key: SESSION_TTL_HOURS
        value: 168
      - key: PUBLIC_APP_URL
        sync: false
      - key: PORT
        value: 3001
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_PUBLIC_URL
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMS_PROVIDER
        value: console
      - key: AI_PROVIDER
        value: heuristic
